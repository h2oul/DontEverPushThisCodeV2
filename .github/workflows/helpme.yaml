name: DevSecOps Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write   # TODO#0a — upload SARIF to Security tab
  pull-requests: write     # TODO#0b — comment on PRs
  issues: write            # TODO#0b — comment on issues
  id-token: write          # TODO#0c — OIDC token

jobs:
    secret-scanning:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0          # TODO#1 — full git history

            - name: Run TruffleHog
              uses: trufflesecurity/trufflehog@main
              continue-on-error: true
              with:
                path: ./
                base: ${{ github.event.repository.default_branch }}  # TODO#2
                head: HEAD                                            # TODO#2
                extra_args: --only-verified                           # TODO#3

            # TODO#4
            - name: Run Gitleaks
              uses: gitleaks/gitleaks-action@v2
              continue-on-error: true
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
                GITLEAKS_ENABLE_SUMMARY: true

    sast-scan:
        runs-on: ubuntu-latest
        needs: secret-scanning
        if: ${{ !cancelled() }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0          # TODO#5 — full history for blame

            # TODO#6
            - name: SonarQube Scan
              uses: SonarSource/sonarqube-scan-action@v7.1.0
              continue-on-error: true
              env:
                SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    codeql-scan:
        runs-on: ubuntu-latest
        needs: secret-scanning
        if: ${{ !cancelled() }}
        strategy:
            matrix:
                language: [ 'javascript-typescript' ]   # TODO#7 — Next.js/React ใช้ JS/TS

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Initialize CodeQL
              uses: github/codeql-action/init@v3
              with:
                languages: ${{ matrix.language }}
                queries: security-extended,security-and-quality   # TODO#8

            # TODO#9
            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@v3
              with:
                category: "/language:${{ matrix.language }}"

    dependency-scanning:
        runs-on: ubuntu-latest
        needs: [sast-scan, secret-scanning]
        if: ${{ !cancelled() }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            # TODO#10
            - name: Set up Node 20
              uses: actions/setup-node@v4
              with:
                node-version: '20'

            # TODO#11
            - name: Install dependencies
              run: npm ci

            - name: Depcheck
              uses: dependency-check/Dependency-Check_Action@main
              continue-on-error: true
              id: Depcheck
              with:
                project: 'DontEverPushThisCodeV2'
                path: '.'
                format: 'SARIF'        # TODO#12 — SARIF integrates กับ Security tab
                out: 'reports'
                args: >
                    --failOnCVSS 7     
                    --enableRetired

            # TODO#14
            - name: Upload Depcheck SARIF to Security tab
              if: always()
              uses: github/codeql-action/upload-sarif@v3
              continue-on-error: true
              with:
                sarif_file: reports/dependency-check-report.sarif
                category: dependency-check

            # TODO#15
            - name: Upload Depcheck HTML report as artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: depcheck-report
                path: reports/

    image-scanning:
        runs-on: ubuntu-latest
        needs: [dependency-scanning]
        if: ${{ !cancelled() }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            # TODO#16
            - name: Build Docker image
              run: docker build -t my-app:latest .

            - name: Trivy Scan
              uses: aquasecurity/trivy-action@master
              continue-on-error: true
              with:
                image-ref: 'my-app:latest'
                format: 'sarif'                          # TODO#17
                output: 'trivy-results.sarif'
                severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'   # TODO#18
                ignore-unfixed: true                     # TODO#19 — ไม่รายงาน CVE ที่ยังไม่มี patch

            # TODO#20
            - name: Upload Trivy SARIF to Security tab
              if: always()
              uses: github/codeql-action/upload-sarif@v3
              with:
                sarif_file: trivy-results.sarif
                category: trivy

            # TODO#21
            - name: Upload Trivy results as artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: trivy-results
                path: trivy-results.sarif